<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMPN 1 Bangsal - Cerdas, Berkarakter, Berprestasi</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

  <!-- Tempat Menampung Navbar Otomatis -->
  <div id="navbar-container"></div>

  <!-- HERO BANNER SECTION (Dynamic from API) -->
  <section id="hero-section" class="relative bg-blue-950 h-[500px] flex items-center justify-center text-center text-white overflow-hidden">
    <div class="absolute inset-0 z-0 opacity-40">
      <img id="hero-bg" src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1200" class="w-full h-full object-cover transition duration-700" alt="Gedung Sekolah">
    </div>
    <div class="relative z-10 max-w-4xl mx-auto px-4">
      <h1 id="hero-title" class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 text-amber-400">Selamat Datang</h1>
      <p id="hero-subtitle" class="text-lg md:text-xl text-slate-200 mb-8 max-w-2xl mx-auto">Mewujudkan generasi unggul, berbudaya, dan bertaqwa di SMPN 1 Bangsal.</p>
      <a id="hero-btn" href="#" class="bg-amber-500 text-blue-950 font-bold px-8 py-3 rounded-full shadow-lg hover:bg-amber-400 transition transform hover:-translate-y-0.5">Jelajahi Konten</a>
    </div>
  </section>

  <!-- BERITA & PENGUMUMAN GRID -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-1 w-full">
    <div class="flex justify-between items-end mb-8 border-b pb-4">
      <div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Berita & Pengumuman Terbaru</h2>
        <p class="text-slate-500 mt-1">Informasi teraktual seputar kegiatan dan agenda SMPN 1 Bangsal.</p>
      </div>
    </div>

    <!-- Container Utama Loading & Grid Kartu Berita -->
    <div id="loading-status" class="text-center py-12 font-medium text-slate-500">Mengambil data dari server database...</div>
    <div id="berita-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>
  </main>

  <!-- Tempat Menampung Footer Otomatis -->
  <div id="footer-container"></div>

  <!-- SCRIPT API HUBUNGAN -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    // Ambil data dan render saat halaman dibuka
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        // 1. Fetch & Set Slider / Banner Utama
        const resSlider = await CMS_API.read("hero_slider");
        if(resSlider.status === "success" && resSlider.data.length > 0) {
          const mainSlider = resSlider.data[0]; // ambil banner baris pertama
          document.getElementById("hero-title").innerText = mainSlider.judul;
          document.getElementById("hero-subtitle").innerText = mainSlider.sub_judul;
          if(mainSlider.url_gambar) document.getElementById("hero-bg").src = mainSlider.url_gambar;
          if(mainSlider.url_tombol) document.getElementById("hero-btn").href = mainSlider.url_tombol;
        }

        // 2. Fetch & Render Grid Berita
        const resBerita = await CMS_API.read("berita_pengumuman");
        const loadingElement = document.getElementById("loading-status");
        const gridElement = document.getElementById("berita-grid");

        if(resBerita.status === "success" && resBerita.data.length > 0) {
          loadingElement.classList.add("hidden");
          gridElement.classList.remove("hidden");
          
          // Render maksimal 3 berita terbaru di beranda
          const listBerita = resBerita.data.reverse().slice(0, 3); 
          gridElement.innerHTML = listBerita.map(b => createBeritaCard(b)).join("");
        } else {
          loadingElement.innerText = "Belum ada berita yang diterbitkan.";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("loading-status").innerText = "Gagal memuat konten. Periksa koneksi API.";
      }
    });
  </script>
</body>
</html>
